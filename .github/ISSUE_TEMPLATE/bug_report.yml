name: Bug Report
description: Report a bug to help us improve dakera-rs
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, please check the [docs](https://dakera.ai/docs) and search [existing issues](https://github.com/Dakera-AI/dakera-rs/issues).
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: dakera-client Version
      placeholder: "e.g. 0.11.49"
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust Version
      placeholder: "e.g. 1.85 (stable)"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Ubuntu 24.04, macOS 15"
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
